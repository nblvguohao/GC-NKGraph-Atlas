mechanism_card:
  id: kynurenine_nk_suppression
  version: 0.1.0
  status: ACTIVE
  one_line: >
    Tumor tryptophan-catabolism enzymes (IDO1/TDO2) produce kynurenine, which
    activates an AHR program in NK cells and independently lowers surface
    NKp46/NKG2D activating-receptor density, impairing NK cytotoxicity.

  origin:
    paper_title: "The tryptophan catabolite L-kynurenine inhibits the surface expression of NKp46- and NKG2D-activating receptors and regulates NK-cell function"
    authors: "Della Chiesa M, Carlomagno S, Frumento G, et al."
    journal: "Blood"
    year: 2006
    doi: "10.1182/blood-2006-03-006700"
    pmid: "16902152"
    lab: "Moretta, University of Genova"
    notes: >
      Trikha P, Lee DA, et al. (Blood Advances 2021, PMID 34559190, DOI
      10.1182/bloodadvances.2021004533) separately anchor kynurenine-driven
      AHR transcriptional activity and reduced cytotoxicity in IL-21-expanded
      NK cells; the two studies are combined here as convergent evidence for
      the same axis via two partially distinct downstream arms (receptor
      down-modulation vs AHR transcriptional program).

  biology:
    phenotype: "Reduced NKp46/NKG2D surface abundance and impaired NK cytotoxicity in a kynurenine-rich microenvironment"
    cell_type_affected: "NK cells (via AHR activation and NKp46/NKG2D down-modulation)"
    tissue_context: "primary human NK-cell experiments; gastric/pan-cancer tumor-context evaluation is prospective"
    mechanistic_chain:
      - step: 1
        actor_cell_type: tumor
        molecular_event: "IDO1/IDO2/TDO2 tryptophan-catabolism enzymes upregulated in tumor and myeloid cells, depleting local tryptophan and producing kynurenine"
      - step: 2
        actor_cell_type: extracellular
        molecular_event: "kynurenine accumulates in the tumor microenvironment"
      - step: 3
        actor_cell_type: nk
        molecular_event: "kynurenine activates the aryl hydrocarbon receptor (AHR) program in NK cells, inducing AHR target genes"
      - step: 4
        actor_cell_type: nk
        molecular_event: "kynurenine separately lowers surface NKp46 (NCR1) and NKG2D (KLRK1) activating-receptor density"
      - step: 5
        actor_cell_type: nk
        molecular_event: "reduced activating-receptor engagement and AHR-driven transcriptional changes together impair NK cytotoxicity and IFN-gamma production"

  transcriptional_proxy:
    status: ACTIVE
    claim_boundary: >
      Transcriptional expression of IDO1/TDO2 captures tumor catabolic
      capacity, not actual kynurenine flux or local concentration, which
      requires targeted metabolomics (LC-MS/MS). AHR target-gene expression
      captures pathway activation capacity, not the causal receptor
      down-modulation, which requires flow cytometry for NKp46/NKG2D surface
      levels.
    modules:
      - name: tumor_catabolic_capacity
        role: tumor_side
        cell_type_attribution: malignant
        genes: [IDO1, IDO2, TDO2]
        expected_direction: higher_is_more_evasive
      - name: nk_ahr_program
        role: immune_side
        cell_type_attribution: nk
        genes: [AHR, CYP1A1, CYP1B1, AHRR]
        expected_direction: higher_is_less_cytotoxic
      - name: nk_activating_receptors
        role: immune_side
        cell_type_attribution: nk
        genes: [NCR1, KLRK1]
        expected_direction: higher_is_more_cytotoxic
      - name: nk_cytotoxicity_readout
        role: outcome_anchor
        cell_type_attribution: nk
        genes: [NKG7, GNLY, GZMB, PRF1, IFNG]
        expected_direction: axis_positive_correlate
      - name: checkpoint_link
        role: therapeutic_hook
        cell_type_attribution: nk
        genes: [HAVCR2, LAG3, PDCD1, TIGIT]
        expected_direction: higher_is_less_cytotoxic
    derived_scores:
      tumor_catabolic_score: "mean_zscore(tumor_catabolic_capacity | malignant)"
      nk_ahr_score: "mean_zscore(nk_ahr_program | nk)"
      nk_receptor_score: "mean_zscore(nk_activating_receptors | nk)"
      kynurenine_axis_score: "integrated(tumor_catabolic_score, nk_ahr_score, nk_receptor_score, outcome)"
    attribution:
      require_celltype_resolution_before_claim: true
      method: scrna_anchored
      unresolved_flag: MIXED_UNRESOLVED
    caveats:
      - "IDO1/TDO2 transcription captures enzymatic capacity, not measured kynurenine concentration; the two can diverge (enzyme activity, substrate availability, local clearance)."
      - "AHR target genes are also activated by other ligands (e.g. dietary/microbial), so elevated AHR-program score is not specific to tumor-derived kynurenine without a matched metabolomics readout."
      - "NKp46/NKG2D surface down-modulation requires flow cytometry; transcript level of NCR1/KLRK1 does not capture post-translational receptor internalization."

  physical_ground_truth:
    status: GATED
    data_modality: ["LC-MS/MS (tryptophan/kynurenine concentration)", "flow cytometry (NKp46/NKG2D surface levels)", "NK-tumor co-culture cytotoxicity ± IDO1 inhibitor"]
    targets: [kynurenine_uM, tryptophan_uM, NKp46_MFI, NKG2D_MFI]
    availability: UNAVAILABLE
    mock_policy:
      allow_mock_for_code_test_only: true
      mock_file_pattern: "*_MOCK_*"
      real_loader_missing_data_behavior: raise_clear_error
      mock_excluded_from_claims: true

  graph_integration:
    new_node_types: [tumor_metabolic_program, nk_receptor_state]
    new_edge_types: [metabolic_crosstalk, receptor_downmodulation]
    rules:
      - "metabolic_crosstalk edges connect tumor_catabolic_capacity genes to nk_ahr_program genes (indirect, metabolite-mediated)"
      - "receptor_downmodulation edges connect tumor_catabolic_capacity to nk_activating_receptors with a negative sign"
      - "no edge derived from external-validation labels"

  validation:
    positive_control:
      purpose: "recover the kynurenine-AHR axis in a cancer type with established IDO1 overexpression (e.g. ovarian or melanoma public cohorts)"
      cohort: SEARCH_REQUIRED
      scrna_dataset: SEARCH_REQUIRED
      prereg_hypotheses:
        - "H1 tumor_catabolic_score (+) nk_ahr_score"
        - "H2 nk_ahr_score (-) nk_receptor_score"
        - "H3 nk_receptor_score (+) cytotoxicity_outcome"
      recovery_definition: "H1-H3 pass in pre-registered direction"
    extension:
      purpose: "test the kynurenine-AHR axis in gastric cancer as an additional mechanism-card demonstration"
      cohort_group: gastric_cancer
    gold_standard_genes: [IDO1, TDO2, AHR, NCR1, KLRK1]

  therapeutic_hook:
    intervention: "IDO1 small-molecule inhibitor (e.g. epacadostat-class) or AHR antagonist"
    combination: "IDO1 inhibition + checkpoint blockade (historically tested, mixed clinical results -- a cautionary precedent for this card)"
    patient_stratification_readout: "in-silico tumor catabolic / NK AHR-program score"
    validation_assays:
      - "NK-tumor co-culture cytotoxicity assay +/- IDO1 inhibitor or AHR antagonist"
      - "LC-MS/MS: tryptophan and kynurenine concentration in co-culture supernatant"
      - "Flow cytometry: NKp46, NKG2D surface levels before/after kynurenine exposure"

  provenance:
    created_by: "GC-NKGraph-Atlas mechanism-card engine"
    created_date: "2026-07-17"
    calibration_status: PENDING
    change_log:
      - "0.1.0 initial card from Della Chiesa et al. Blood 2006 + Trikha et al. Blood Advances 2021, authored to demonstrate format reuse for a metabolite-mediated (non-ligand-receptor) NK-suppression mechanism"
