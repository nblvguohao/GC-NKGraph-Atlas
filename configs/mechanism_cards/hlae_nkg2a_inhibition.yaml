mechanism_card:
  id: hlae_nkg2a_inhibition
  version: 0.1.0
  status: ACTIVE
  one_line: >
    Tumor-surface HLA-E-peptide complexes engage the inhibitory CD94/NKG2A
    heterodimer on NK cells, triggering inhibitory signaling that protects
    the tumor cell from NK-mediated lysis.

  origin:
    paper_title: "HLA-E binds to natural killer cell receptors CD94/NKG2A, B and C"
    authors: "Braud VM, Allan DS, O'Callaghan CA, et al."
    journal: "Nature"
    year: 1998
    doi: "10.1038/35869"
    pmid: "9486650"
    lab: "McMichael, Weatherall Institute of Molecular Medicine, Oxford"
    notes: >
      HLA-E is a non-classical MHC-I molecule that presents leader-sequence
      peptides from classical HLA-A/B/C and HLA-G; its surface expression
      therefore depends on both HLA-E transcription and the availability of
      those leader peptides, not on HLA-E transcript level alone.

  biology:
    phenotype: "CD94/NKG2A-dependent protection of HLA-E-positive tumor cells from NK lysis"
    cell_type_affected: "NK cells (via CD94/NKG2A vs CD94/NKG2C receptor balance)"
    tissue_context: "primary human NK-clone experiments; gastric/pan-cancer tumor-context evaluation is prospective"
    mechanistic_chain:
      - step: 1
        actor_cell_type: tumor
        molecular_event: "classical HLA-A/B/C (and HLA-G) leader-sequence peptides loaded onto HLA-E; surface HLA-E-peptide complex forms"
      - step: 2
        actor_cell_type: nk
        molecular_event: "CD94/NKG2A (inhibitory) and CD94/NKG2C (activating) are co-expressed on subsets of NK cells and compete for HLA-E"
      - step: 3
        actor_cell_type: nk
        molecular_event: "NKG2A-dominant engagement triggers ITIM-mediated inhibitory signaling"
      - step: 4
        actor_cell_type: nk
        molecular_event: "NK cytotoxicity and cytokine production against the HLA-E-positive target are suppressed"

  transcriptional_proxy:
    status: ACTIVE
    claim_boundary: >
      Transcriptional expression of HLA-E and KLRC1(NKG2A)/KLRD1(CD94) captures
      antigen-presentation and receptor capacity, not surface HLA-E-peptide
      complex density, actual peptide occupancy, or the NKG2A:NKG2C balance
      engaged. Physical ground-truth requires flow cytometry for surface HLA-E
      and NKG2A/NKG2C, and a co-culture cytotoxicity assay with NKG2A blockade
      (e.g. monalizumab-class).
    modules:
      - name: tumor_hlae_presentation
        role: tumor_side
        cell_type_attribution: malignant
        genes: [HLA-E]
        expected_direction: higher_is_more_evasive
      - name: nk_inhibitory_receptor
        role: immune_side
        cell_type_attribution: nk
        genes: [KLRC1, KLRD1]
        expected_direction: higher_is_less_cytotoxic
      - name: nk_competing_activating_receptor
        role: immune_side
        cell_type_attribution: nk
        genes: [KLRC2]
        expected_direction: higher_is_more_cytotoxic
      - name: nk_cytotoxicity_readout
        role: outcome_anchor
        cell_type_attribution: nk
        genes: [NKG7, GNLY, GZMB, PRF1, IFNG]
        expected_direction: axis_positive_correlate
      - name: checkpoint_link
        role: therapeutic_hook
        cell_type_attribution: nk
        genes: [HAVCR2, LAG3, PDCD1, TIGIT]
        expected_direction: higher_is_less_cytotoxic
    derived_scores:
      tumor_hlae_score: "zscore(HLA-E | malignant)"
      nk_receptor_balance: "zscore(KLRC1 | nk) - zscore(KLRC2 | nk)"
      hlae_axis_score: "integrated(tumor_hlae_score, nk_receptor_balance, outcome)"
    attribution:
      require_celltype_resolution_before_claim: true
      method: scrna_anchored
      unresolved_flag: MIXED_UNRESOLVED
    caveats:
      - "HLA-E surface expression depends on leader-peptide supply from classical HLA-A/B/C/G, not HLA-E transcription alone; this card does not model peptide supply."
      - "KLRC1(NKG2A) and KLRC2(NKG2C) compete for the same ligand; transcript level of either alone does not resolve which one dominates at the synapse."
      - "NKG2A blockade efficacy requires flow cytometry and functional co-culture, not inferable from transcription alone."

  physical_ground_truth:
    status: GATED
    data_modality: ["flow cytometry (HLA-E, NKG2A, NKG2C surface levels)", "NK-tumor co-culture cytotoxicity ± anti-NKG2A"]
    targets: [HLAE_MFI, NKG2A_MFI, NKG2C_MFI]
    availability: UNAVAILABLE
    mock_policy:
      allow_mock_for_code_test_only: true
      mock_file_pattern: "*_MOCK_*"
      real_loader_missing_data_behavior: raise_clear_error
      mock_excluded_from_claims: true

  graph_integration:
    new_node_types: [tumor_ligand_program, nk_receptor_balance_state]
    new_edge_types: [ligand_receptor, receptor_competition]
    rules:
      - "ligand_receptor edges connect tumor HLA-E to NK receptors (KLRC1, KLRD1, KLRC2)"
      - "receptor_competition edges connect KLRC1 and KLRC2 with a competitive (mutually suppressive) sign"
      - "no edge derived from external-validation labels"

  validation:
    positive_control:
      purpose: "recover the HLA-E-NKG2A axis in a cancer type with established NKG2A-blockade activity (e.g. head-and-neck or cervical public cohorts)"
      cohort: SEARCH_REQUIRED
      scrna_dataset: SEARCH_REQUIRED
      prereg_hypotheses:
        - "H1 tumor_hlae_score (+) nk_dysfunction_score"
        - "H2 nk_receptor_balance (NKG2A-dominant) (+) nk_dysfunction_score"
        - "H3 nk_receptor_balance (+) cytotoxicity_outcome (NKG2C-dominant favors cytotoxicity)"
      recovery_definition: "H1-H3 pass in pre-registered direction"
    extension:
      purpose: "test the HLA-E-NKG2A axis in gastric cancer as an additional mechanism-card demonstration"
      cohort_group: gastric_cancer
    gold_standard_genes: [HLA-E, KLRC1, KLRD1, KLRC2]

  therapeutic_hook:
    intervention: "anti-NKG2A blocking antibody (e.g. monalizumab-class)"
    combination: "anti-NKG2A + anti-PD-1/PD-L1 or anti-EGFR (established combination strategy)"
    patient_stratification_readout: "in-silico NKG2A:NKG2C receptor-balance score"
    validation_assays:
      - "NK-tumor co-culture cytotoxicity assay +/- anti-NKG2A blockade"
      - "Flow cytometry: HLA-E, NKG2A, NKG2C, CD94 surface levels"
      - "IFN-gamma / degranulation (CD107a) assay with and without blockade"

  provenance:
    created_by: "GC-NKGraph-Atlas mechanism-card engine"
    created_date: "2026-07-17"
    calibration_status: PENDING
    change_log:
      - "0.1.0 initial card from Braud et al. Nature 1998, authored to demonstrate format reuse across NK checkpoint axes"
