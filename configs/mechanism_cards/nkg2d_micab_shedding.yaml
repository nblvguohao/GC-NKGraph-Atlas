mechanism_card:
  id: nkg2d_micab_shedding
  version: 0.1.0
  status: ACTIVE
  one_line: >
    Tumor cells shed MICA/B surface ligands via ADAM10/ADAM17 proteolytic cleavage,
    releasing soluble MICA/B (sMICA/sMICB) that desensitizes the NKG2D receptor
    on NK cells and impairs NK-mediated tumor recognition and killing.

  origin:
    paper_title: "Tumour-derived soluble MIC ligands impair expression of NKG2D and T-cell activation"
    authors: "Groh V, Wu J, Yee C, Spies T"
    journal: "Nature"
    year: 2002
    doi: "10.1038/nature01112"
    pmid: "12384620"
    lab: "Spies, Fred Hutchinson Cancer Research Center"
    notes: >
      The NKG2D-MICA/B axis is one of the most well-characterized NK immune-evasion
      mechanisms. Unlike the SST axis (metabolic topology), this is a
      ligand-receptor shedding mechanism. Together they span two orthogonal
      immune-evasion strategies: physical/metabolic (SST) vs recognition (NKG2D).
      Demonstrating the mechanism-card engine on BOTH axes establishes reusability.

  biology:
    phenotype: "Loss of NKG2D-mediated NK recognition; reduced NK cytotoxicity against MICA/B+ tumors"
    cell_type_affected: "NK cells (via NKG2D receptor desensitization)"
    tissue_context: "pan-cancer (MICA/B overexpressed in many epithelial cancers)"
    mechanistic_chain:
      - step: 1
        actor_cell_type: tumor
        molecular_event: "MICA/B and ULBP1-6 stress ligands upregulated on tumor cell surface (DNA damage, transformation)"
      - step: 2
        actor_cell_type: tumor
        molecular_event: "ADAM10/ADAM17 metalloproteases cleave MICA/B from tumor surface (ectodomain shedding)"
      - step: 3
        actor_cell_type: extracellular
        molecular_event: "soluble MICA/B (sMICA/sMICB) accumulates in tumor microenvironment and serum"
      - step: 4
        actor_cell_type: nk
        molecular_event: "sMICA/sMICB binds NKG2D on NK cells → chronic stimulation → receptor internalization/degradation"
      - step: 5
        actor_cell_type: nk
        molecular_event: "Loss of NKG2D surface expression → impaired recognition of MICA/B+ tumor cells → reduced NK cytotoxicity"

  transcriptional_proxy:
    status: ACTIVE
    claim_boundary: >
      Transcriptional expression of MICA/MICB, ADAM10/17, and NKG2D captures the
      machinery/capacity for the shedding axis, not the actual proteolytic cleavage
      or serum sMICA levels. Physical ground-truth requires serum ELISA for sMICA/sMICB
      and flow cytometry for NKG2D surface expression.
    modules:
      - name: tumor_stress_ligands
        role: tumor_side
        cell_type_attribution: malignant
        genes: [MICA, MICB, ULBP1, ULBP2, ULBP3, ULBP4, ULBP5, ULBP6]
        expected_direction: higher_is_more_immunogenic
      - name: tumor_shedding_machinery
        role: tumor_side
        cell_type_attribution: malignant
        genes: [ADAM10, ADAM17, MMP14, TIMP3]
        expected_direction: higher_is_more_evasive
      - name: nk_recognition_receptor
        role: immune_side
        cell_type_attribution: nk
        genes: [KLRK1, HCST, KLRD1, KLRC1, KLRC2, KLRC3, KLRC4]
        expected_direction: higher_is_more_cytotoxic
      - name: nk_downstream_signaling
        role: immune_side
        cell_type_attribution: nk
        genes: [DAP10, PIK3R1, PIK3CA, AKT1, GRB2, VAV1, PLCG1, PLCG2]
        expected_direction: higher_is_more_cytotoxic
      - name: nk_cytotoxicity_readout
        role: outcome_anchor
        cell_type_attribution: nk
        genes: [NKG7, GNLY, GZMB, PRF1, IFNG, TNF, FASLG, TRAIL]
        expected_direction: axis_positive_correlate
      - name: checkpoint_link
        role: therapeutic_hook
        cell_type_attribution: nk
        genes: [HAVCR2, LAG3, TIGIT, CD96, PDCD1]
        expected_direction: higher_is_less_cytotoxic
    derived_scores:
      tumor_ligand_score: "mean_zscore(tumor_stress_ligands | malignant)"
      tumor_shedding_score: "mean_zscore(tumor_shedding_machinery | malignant)"
      nk_receptor_score: "mean_zscore(nk_recognition_receptor | nk)"
      nk_signaling_score: "mean_zscore(nk_downstream_signaling | nk)"
      nk_evasion_index: "tumor_shedding_score - nk_receptor_score"
      nkg2d_axis_score: "integrated(tumor_ligand_score, tumor_shedding_score, nk_receptor_score, outcome)"
    attribution:
      require_celltype_resolution_before_claim: true
      method: scrna_anchored
      unresolved_flag: MIXED_UNRESOLVED
    caveats:
      - "Transcriptional proxy captures machinery/capacity, not actual proteolytic cleavage."
      - "sMICA/sMICB serum levels require ELISA — not inferable from transcriptome."
      - "NKG2D surface expression requires flow cytometry — transcription ≠ surface protein."
      - "ADAM10/17 are broadly expressed; cell-type attribution is mandatory."

  physical_ground_truth:
    status: GATED
    data_modality: ["serum ELISA (sMICA/sMICB)", "flow cytometry (NKG2D surface)", "shedding assay"]
    targets: [sMICA_pg_ml, sMICB_pg_ml, NKG2D_MFI, ADAM10_activity]
    availability: UNAVAILABLE
    mock_policy:
      allow_mock_for_code_test_only: true
      mock_file_pattern: "*_MOCK_*"
      real_loader_missing_data_behavior: raise_clear_error
      mock_excluded_from_claims: true

  graph_integration:
    new_node_types: [tumor_ligand_program, nk_receptor_state]
    new_edge_types: [ligand_receptor, shedding_interaction, nkg2d_signaling]
    rules:
      - "ligand_receptor edges connect tumor ligands (MICA/B/ULBPs) to NK receptors (NKG2D/KLRK1)"
      - "shedding_interaction edges connect ADAM10/17 to MICA/B with negative sign"
      - "nkg2d_signaling edges connect KLRK1 to downstream DAP10/PI3K pathway"
      - "no edge derived from external-validation labels"

  validation:
    positive_control:
      purpose: "recover the NKG2D-MICA/B shedding axis in pan-cancer transcriptomes"
      cohort: TCGA-LIHC
      scrna_dataset: SEARCH_REQUIRED
      prereg_hypotheses:
        - "H1 tumor_stress_ligands (−) tumor_shedding_machinery (immune evasion correlates)"
        - "H2 tumor_shedding_machinery (−) nk_receptor_score"
        - "H3 nk_receptor_score (+) nk_signaling_score"
        - "H4 nk_signaling_score (+) cytotoxicity_outcome"
        - "H5 nk_evasion_index (−) checkpoint_link (evasion → checkpoint upregulation)"
      recovery_definition: "H3-H5 pass in pre-registered direction"
    extension:
      purpose: "test the NKG2D axis in gastric cancer as second mechanism-card demonstration"
      cohort_group: gastric_cancer
    gold_standard_genes: [MICA, MICB, ADAM10, ADAM17, KLRK1, HCST, ULBP1, ULBP2]

  therapeutic_hook:
    intervention: "block ADAM10/17-mediated MICA/B shedding (monoclonal antibody or small-molecule inhibitor)"
    combination: "ADAM10/17 inhibition + anti-Tim3/TIGIT checkpoint blockade"
    patient_stratification_readout: "in-silico NKG2D-axis evasion score"
    validation_assays:
      - "NK-tumor co-culture cytotoxicity assay ± ADAM10/17 inhibitor"
      - "Serum sMICA/sMICB ELISA (pre/post treatment)"
      - "Flow cytometry: NKG2D surface expression on NK cells"
      - "ADAM10/17 protease activity assay"

  provenance:
    created_by: "GC-NKGraph-Atlas mechanism-card engine"
    created_date: "2026-07-10"
    calibration_status: PENDING
    change_log:
      - "0.1.0 initial card from Nature 2002 + subsequent NKG2D-MICA/B literature"
