mechanism_card:
  id: adenosine_nk_suppression
  version: 0.1.0
  status: ACTIVE
  one_line: >
    Tumor-derived adenosine (via CD39/CD73 ectonucleotidases) binds A2A/A2B
    receptors on NK cells, activating cAMP-PKA signaling that suppresses NK
    cytotoxicity, IFN-γ production, and granule exocytosis; rescued by A2AR
    antagonists or CD73 blockade.

  origin:
    paper_title: "Adenosine mediates NK cell dysfunction in the tumor microenvironment"
    authors: "Chambers AM, Matosevic S, et al."
    journal: "Journal for ImmunoTherapy of Cancer"
    year: 2019
    doi: "10.1136/jitc-2019-000190"
    pmid: ""
    lab: "Matosevic / various"
    notes: >
      Adenosine-mediated NK suppression is a well-established metabolic immune
      checkpoint. CD73 (NT5E) and CD39 (ENTPD1) sequentially convert extracellular
      ATP to AMP to adenosine. A2AR (ADORA2A) and A2BR (ADORA2B) are the cognate
      receptors on NK cells. Pharmacologically targetable: oleclumab (anti-CD73),
      CPI-444 (A2AR antagonist), IPH5201 (anti-CD39) are in Phase 1/2/3 trials.
      Parallel to the Zheng 2023 SM axis — independent mechanism, different
      metabolic pathway, same effector cell type.

  biology:
    phenotype: "Suppressed NK cytotoxicity, reduced IFN-gamma secretion, impaired granule polarization"
    cell_type_affected: "intratumoral NK cells"
    tissue_context: "pan-cancer (breast, lung, colorectal, gastric, ovarian)"
    mechanistic_chain:
      - step: 1
        actor_cell_type: tumor
        molecular_event: "tumor cells and Tregs upregulate CD39 (ENTPD1) and CD73 (NT5E), converting extracellular ATP to adenosine"
      - step: 2
        actor_cell_type: nk
        molecular_event: "adenosine binds A2AR (ADORA2A) and A2BR (ADORA2B) on NK cells, activating Gs-coupled cAMP-PKA signaling"
      - step: 3
        actor_cell_type: nk
        molecular_event: "PKA phosphorylates and inhibits Vav1, blocking NK activating receptor signaling and granule polarization"
      - step: 4
        actor_cell_type: nk
        molecular_event: "reduced granzyme B / perforin secretion, impaired immune synapse stability"
      - step: 5
        actor_cell_type: nk
        molecular_event: "loss of NK cytotoxicity; compensatory upregulation of inhibitory receptors (TIGIT, CD96)"

  transcriptional_proxy:
    status: ACTIVE
    claim_boundary: >
      Outputs describe a transcriptional program ASSOCIATED-WITH adenosine-mediated
      NK suppression. Never claim direct measurement of adenosine concentration
      or cAMP-PKA signaling flux from transcriptome.
    modules:
      - name: tumor_adenosine_pathway
        role: tumor_side
        cell_type_attribution: malignant
        genes: [NT5E, ENTPD1, ADA, ADK, SLC29A1, SLC29A2, SLC28A1, SLC28A2, SLC28A3]
        expected_direction: NEEDS_REVIEW
      - name: nk_adenosine_receptors
        role: immune_side
        cell_type_attribution: nk
        genes: [ADORA2A, ADORA2B, ADORA1, ADORA3]
        expected_direction: higher_is_more_suppressed
      - name: nk_camp_pka_effectors
        role: immune_side
        cell_type_attribution: nk
        genes: [PRKACA, PRKACB, PRKAR1A, PRKAR2A, CREB1, CREBBP, EP300, AKAP1, AKAP5]
        expected_direction: context_dependent
      - name: nk_cytolytic_machinery
        role: outcome_anchor
        cell_type_attribution: nk
        genes: [NKG7, GNLY, GZMB, PRF1, IFNG, LCP2, LAT, VAV1, TLN1, ITGAL, ITGB2]
        expected_direction: axis_positive_correlate
      - name: nk_inhibitory_receptors
        role: therapeutic_hook
        cell_type_attribution: nk
        genes: [TIGIT, CD96, KLRC1, KLRD1, HAVCR2, LAG3, CTLA4, PDCD1]
        expected_direction: higher_is_more_suppressed
    derived_scores:
      tumor_adenosine_pathway_score: "mean_zscore(tumor_adenosine_pathway | malignant)"
      nk_a2ar_signaling_score: "mean_zscore(nk_adenosine_receptors | nk) + mean_zscore(nk_camp_pka_effectors | nk)"
      nk_adenosine_suppression_score: "integrated(tumor_adenosine_pathway_score[calibrated], nk_a2ar_signaling_score, outcome_inverse)"
    attribution:
      require_celltype_resolution_before_claim: true
      method: scrna_anchored
      unresolved_flag: MIXED_UNRESOLVED
    caveats:
      - "Transcriptional proxy != adenosine concentration != cAMP-PKA flux."
      - "Adenosine concentration is a metabolite-level effect governed by enzyme kinetics, not expression."
      - "A2AR signaling depends on receptor occupancy and ligand availability, not just receptor expression."
      - "Cell-type attribution is mandatory; CD73/CD39 are expressed by multiple stromal populations."

  physical_ground_truth:
    status: GATED
    data_modality: ["LC-MS adenosine quantification", "cAMP ELISA", "phospho-PKA western blot"]
    targets: [tumor_interstitial_adenosine_concentration, nk_cAMP_level, nk_pPKA_level,
              nk_immune_synapse_stability_time]
    availability: UNAVAILABLE
    mock_policy:
      allow_mock_for_code_test_only: true
      mock_file_pattern: "*_MOCK_*"
      real_loader_missing_data_behavior: raise_clear_error
      mock_excluded_from_claims: true

  graph_integration:
    new_node_types: [tumor_adenosine_program, nk_pka_state]
    new_edge_types: [adenosine_crosstalk, atp_cascade]
    rules:
      - "adenosine_crosstalk edges require cell-type-resolved endpoints"
      - "crosstalk edge sign is calibrated on the positive-control cohort, not assumed"
      - "no edge derived from external-validation labels"

  validation:
    positive_control:
      purpose: "recover the adenosine-A2AR-cAMP-cytotoxicity axis from transcriptomes"
      cohort: TCGA-STAD
      scrna_dataset: GSE246662
      prereg_hypotheses:
        - "H1 tumor_adenosine_pathway (+) nk_adenosine_receptors (direction calibrated)"
        - "H2 nk_adenosine_receptors (-) nk_cytolytic_machinery"
        - "H3 nk_camp_pka_effectors (-) nk_cytolytic_machinery"
        - "H4 nk_inhibitory_receptors (-) nk_cytolytic_machinery"
      recovery_definition: "H2-H4 pass in expected direction in gastric cancer"
    extension:
      purpose: "identify adenosine-pathway-driven NK suppression targets in gastric cancer"
      cohort_group: gastric_cancer
    gold_standard_genes: [NT5E, ENTPD1, ADORA2A, ADORA2B, TIGIT, CD96, PRKACA, LCP2, VAV1, IFNG]

  therapeutic_hook:
    intervention: "block adenosine production (anti-CD73 oleclumab / anti-CD39 IPH5201) or block A2AR signaling (CPI-444 / AZD4635)"
    combination: "A2AR antagonist + anti-PD-1/PD-L1 (known clinical synergy) + optionally Tim3 blockade"
    patient_stratification_readout: "in-silico adenosine-pathway benefit score"
    validation_assays:
      - "NK-tumor co-culture + adenosine/NECA + A2AR antagonist (ZM241385) rescue"
      - "cAMP ELISA on sorted intratumoral NK cells"
      - "phospho-PKA flow cytometry"
      - "CD107a degranulation assay + IFN-gamma intracellular staining"
      - "CD73 IHC on tumor sections"

  provenance:
    created_by: "GC-NKGraph-Atlas mechanism-card framework"
    created_date: "2026-07-09"
    calibration_status: PENDING
    change_log:
      - "0.1.0 initial card from adenosine-NK literature (Chambers 2019, Vigano 2019, Young 2018, adding gastric context)"
