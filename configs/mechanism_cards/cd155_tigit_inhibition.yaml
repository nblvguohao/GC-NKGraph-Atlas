mechanism_card:
  id: cd155_tigit_inhibition
  version: 0.1.0
  status: ACTIVE
  one_line: >
    Tumor-surface CD155 (and CD112) engage the inhibitory receptor TIGIT on NK
    cells, outcompeting the activating receptor CD226 (DNAM-1) for the same
    ligands and suppressing NK cytotoxicity against the tumor cell.

  origin:
    paper_title: "The interaction of TIGIT with PVR and PVRL2 inhibits human NK cell cytotoxicity"
    authors: "Stanietsky N, Simic H, Arapovic J, et al."
    journal: "Proceedings of the National Academy of Sciences USA"
    year: 2009
    doi: "10.1073/pnas.0903474106"
    pmid: "19815499"
    lab: "Mandelboim, Hebrew University of Jerusalem"
    notes: >
      TIGIT competes with the activating receptor CD226 (DNAM-1) for the same
      two ligands (CD155/PVR, CD112/NECTIN2), so the axis is a receptor
      balance rather than a single ligand-receptor pair. PVR and NECTIN2
      already surface independently in this project's own tumor-intrinsic
      candidate pool (nk_inhibitory_ligand category), which motivated
      authoring this card to make that connection explicit and testable.

  biology:
    phenotype: "TIGIT-dependent inhibition of NK cytotoxicity against CD155/CD112-positive targets"
    cell_type_affected: "NK cells (via TIGIT vs CD226 receptor balance)"
    tissue_context: "primary human NK-cell experiments; gastric/pan-cancer tumor-context evaluation is prospective"
    mechanistic_chain:
      - step: 1
        actor_cell_type: tumor
        molecular_event: "CD155 (PVR) and CD112 (NECTIN2) upregulated on tumor cell surface"
      - step: 2
        actor_cell_type: nk
        molecular_event: "TIGIT (inhibitory) and CD226/DNAM-1 (activating) are co-expressed on NK cells and compete for the same ligands"
      - step: 3
        actor_cell_type: nk
        molecular_event: "high tumor ligand density favors TIGIT engagement (higher affinity than CD226) over CD226 engagement"
      - step: 4
        actor_cell_type: nk
        molecular_event: "TIGIT ITIM/ITT-like signaling suppresses NK activation, reducing cytotoxicity and IFN-gamma production"

  transcriptional_proxy:
    status: ACTIVE
    claim_boundary: >
      Transcriptional expression of PVR/NECTIN2 and TIGIT/CD226 captures ligand
      and receptor capacity, not surface protein density, receptor occupancy,
      or the TIGIT:CD226 balance actually engaged at the immune synapse.
      Physical ground-truth requires flow cytometry (receptor surface levels)
      and a co-culture cytotoxicity assay with TIGIT blockade.
    modules:
      - name: tumor_inhibitory_ligands
        role: tumor_side
        cell_type_attribution: malignant
        genes: [PVR, NECTIN2]
        expected_direction: higher_is_more_evasive
      - name: nk_inhibitory_receptor
        role: immune_side
        cell_type_attribution: nk
        genes: [TIGIT]
        expected_direction: higher_is_less_cytotoxic
      - name: nk_competing_activating_receptor
        role: immune_side
        cell_type_attribution: nk
        genes: [CD226]
        expected_direction: higher_is_more_cytotoxic
      - name: nk_cytotoxicity_readout
        role: outcome_anchor
        cell_type_attribution: nk
        genes: [NKG7, GNLY, GZMB, PRF1, IFNG]
        expected_direction: axis_positive_correlate
      - name: checkpoint_link
        role: therapeutic_hook
        cell_type_attribution: nk
        genes: [HAVCR2, LAG3, PDCD1, CD96]
        expected_direction: higher_is_less_cytotoxic
    derived_scores:
      tumor_ligand_score: "mean_zscore(tumor_inhibitory_ligands | malignant)"
      nk_receptor_balance: "zscore(TIGIT | nk) - zscore(CD226 | nk)"
      nkg2d_axis_score: "integrated(tumor_ligand_score, nk_receptor_balance, outcome)"
    attribution:
      require_celltype_resolution_before_claim: true
      method: scrna_anchored
      unresolved_flag: MIXED_UNRESOLVED
    caveats:
      - "TIGIT and CD226 compete for the same ligands; transcript levels of either receptor alone do not resolve which one dominates at the synapse."
      - "PVR/NECTIN2 are also broadly expressed on non-malignant epithelium; cell-type attribution is mandatory before a tumor-specificity claim."
      - "TIGIT surface occupancy and blockade efficacy require flow cytometry and functional co-culture, not inferable from transcription alone."

  physical_ground_truth:
    status: GATED
    data_modality: ["flow cytometry (TIGIT/CD226/CD155/CD112 surface levels)", "NK-tumor co-culture cytotoxicity ± anti-TIGIT"]
    targets: [TIGIT_MFI, CD226_MFI, CD155_MFI, CD112_MFI]
    availability: UNAVAILABLE
    mock_policy:
      allow_mock_for_code_test_only: true
      mock_file_pattern: "*_MOCK_*"
      real_loader_missing_data_behavior: raise_clear_error
      mock_excluded_from_claims: true

  graph_integration:
    new_node_types: [tumor_ligand_program, nk_receptor_balance_state]
    new_edge_types: [ligand_receptor, receptor_competition]
    rules:
      - "ligand_receptor edges connect tumor ligands (PVR, NECTIN2) to NK receptors (TIGIT, CD226)"
      - "receptor_competition edges connect TIGIT and CD226 with a competitive (mutually suppressive) sign"
      - "no edge derived from external-validation labels"

  validation:
    positive_control:
      purpose: "recover the CD155/CD112-TIGIT axis in a cancer type with established TIGIT-blockade activity (e.g. melanoma or NSCLC public cohorts)"
      cohort: SEARCH_REQUIRED
      scrna_dataset: SEARCH_REQUIRED
      prereg_hypotheses:
        - "H1 tumor_inhibitory_ligands (+) nk_dysfunction_score"
        - "H2 nk_receptor_balance (TIGIT-dominant) (+) nk_dysfunction_score"
        - "H3 nk_receptor_balance (+) cytotoxicity_outcome (CD226-dominant favors cytotoxicity)"
      recovery_definition: "H1-H3 pass in pre-registered direction"
    extension:
      purpose: "test the CD155/CD112-TIGIT axis in gastric cancer as an additional mechanism-card demonstration; cross-reference against this project's own PVR/NECTIN2 candidate signal"
      cohort_group: gastric_cancer
    gold_standard_genes: [PVR, NECTIN2, TIGIT, CD226]

  therapeutic_hook:
    intervention: "anti-TIGIT blocking antibody (e.g. tiragolumab-class), alone or combined with CD226-preserving strategies"
    combination: "anti-TIGIT + anti-PD-1/PD-L1 or anti-HAVCR2 (Tim3) checkpoint blockade"
    patient_stratification_readout: "in-silico TIGIT:CD226 receptor-balance score"
    validation_assays:
      - "NK-tumor co-culture cytotoxicity assay +/- anti-TIGIT blockade"
      - "Flow cytometry: TIGIT, CD226, CD155, CD112 surface levels"
      - "IFN-gamma / degranulation (CD107a) assay with and without blockade"

  provenance:
    created_by: "GC-NKGraph-Atlas mechanism-card engine"
    created_date: "2026-07-17"
    calibration_status: PENDING
    change_log:
      - "0.1.0 initial card from Stanietsky et al. PNAS 2009, authored to demonstrate format reuse and to connect this project's own PVR/NECTIN2 candidate signal to a named checkpoint mechanism"
