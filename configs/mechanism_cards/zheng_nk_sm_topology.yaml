mechanism_card:
  id: zheng_nk_sm_topology
  version: 0.1.0
  status: ACTIVE
  one_line: >
    Tumor serine-metabolism dysregulation lowers sphingomyelin in NK-cell
    membranes, collapsing membrane protrusions and lytic synapse formation and
    abolishing NK cytotoxicity; rescued by blocking SM catabolism, synergistic
    with Tim3 blockade.

  origin:
    paper_title: "Tumors evade immune cytotoxicity by altering the surface topology of NK cells"
    authors: "Zheng X, Hou Z, Qian Y, ... Tian Z, Huang G, Wei H"
    journal: "Nature Immunology"
    year: 2023
    doi: "10.1038/s41590-023-01462-9"
    pmid: "36959292"
    lab: "Wei Haiming / Zheng Xiaohu / Tian Zhigang, USTC"
    notes: >
      Follow-up framing "Sphingomyelin is a prospective metabolic immune
      checkpoint for NK cells" (Clin Transl Med 2023, DOI 10.1002/ctm2.1395)
      states the mechanism extends beyond liver to lung, colon and ovarian
      cancers. Gastric cancer is a natural, not-yet-claimed digestive-tract
      extension.

  biology:
    phenotype: "Loss / shortening of NK-cell membrane protrusions (microvilli); smooth, rounded NK surface"
    cell_type_affected: "intratumoral NK cells"
    tissue_context: "liver / hepatocellular carcinoma (HCC)"
    mechanistic_chain:
      - step: 1
        actor_cell_type: tumor
        molecular_event: "dysregulated tumor serine metabolism reduces serine available for NK sphingolipid synthesis"
      - step: 2
        actor_cell_type: nk
        molecular_event: "reduced sphingomyelin (SM) content in NK membrane (SGMS1-dependent synthesis vs SMPD catabolism)"
      - step: 3
        actor_cell_type: nk
        molecular_event: "loss of membrane protrusions / microvilli (cortical actin / ERM / Arp2-3 machinery)"
      - step: 4
        actor_cell_type: nk
        molecular_event: "failure to recognize tumor and to form lytic immunological synapse"
      - step: 5
        actor_cell_type: nk
        molecular_event: "loss of cytotoxicity; Tim3 (HAVCR2) upregulated"

  transcriptional_proxy:
    status: ACTIVE
    claim_boundary: >
      Outputs describe a transcriptional program PERMISSIVE-OF / ASSOCIATED-WITH
      the topology phenotype. Never claim prediction of physical membrane
      topology or of SM metabolite content from transcriptome.
    modules:
      - name: tumor_serine_capacity
        role: tumor_side
        cell_type_attribution: malignant
        genes: [PHGDH, PSAT1, PSPH, SHMT1, SHMT2, MTHFD1, MTHFD2, MTHFD1L, SLC1A4, SLC1A5]
        expected_direction: NEEDS_REVIEW
      - name: nk_sm_synthesis
        role: immune_side
        cell_type_attribution: nk
        genes: [SGMS1, SGMS2]
        expected_direction: higher_is_more_topology_permissive
      - name: nk_sm_catabolism
        role: immune_side
        cell_type_attribution: nk
        genes: [SMPD1, SMPD2, SMPD3, SMPD4]
        expected_direction: higher_is_less_topology_permissive
      - name: nk_denovo_sphingolipid
        role: immune_side
        cell_type_attribution: nk
        genes: [SPTLC1, SPTLC2, SPTLC3, SPTSSA, CERS2, CERS4, CERS5, CERS6, DEGS1]
        expected_direction: context_dependent
      - name: nk_protrusion_machinery
        role: immune_side
        cell_type_attribution: nk
        genes: [EZR, MSN, RDX, ACTR2, ACTR3, ARPC1B, ARPC2, ARPC3, ARPC4, ARPC5,
                WAS, WASL, WASF1, WASF2, WASF3, WIPF1, CDC42, RAC1, RHOA,
                DIAPH1, DIAPH3, FMNL1, BAIAP2, PACSIN2]
        expected_direction: higher_is_more_topology_permissive
      - name: nk_synapse_cytotoxicity_outcome
        role: outcome_anchor
        cell_type_attribution: nk
        genes: [NKG7, GNLY, GZMB, PRF1, IFNG, LCP2, LAT, VAV1, TLN1, ITGAL, ITGB2]
        expected_direction: axis_positive_correlate
      - name: checkpoint_link
        role: therapeutic_hook
        cell_type_attribution: nk
        genes: [HAVCR2]
        expected_direction: higher_is_less_topology_permissive
    derived_scores:
      tumor_serine_capacity_score: "mean_zscore(tumor_serine_capacity | malignant)"
      nk_sm_balance_score: "mean_zscore(nk_sm_synthesis) - mean_zscore(nk_sm_catabolism)"
      nk_protrusion_machinery_score: "mean_zscore(nk_protrusion_machinery | nk)"
      nk_topology_permissive_score: "composite(nk_sm_balance_score, nk_protrusion_machinery_score)"
      sst_axis_score: "integrated(tumor_serine_capacity_score[calibrated sign], nk_topology_permissive_score, outcome)"
    attribution:
      require_celltype_resolution_before_claim: true
      method: scrna_anchored
      unresolved_flag: MIXED_UNRESOLVED
    caveats:
      - "Transcriptional proxy != physical topology != metabolite flux."
      - "Serine/SM crosstalk is a metabolite-level effect; transcription captures machinery/capacity only."
      - "SM/serine/actin genes are broadly expressed; cell-type attribution is mandatory before any tumor-vs-NK claim."
      - "Tumor-serine direction w.r.t. NK SM availability MUST be calibrated, not assumed."

  physical_ground_truth:
    status: GATED
    data_modality: ["SEM / super-resolution imaging", "single-immunocyte mass spectrometry"]
    targets: [membrane_protrusion_density, microvilli_density, membrane_roughness,
              immune_synapse_contact_area, membrane_SM_content]
    availability: UNAVAILABLE
    mock_policy:
      allow_mock_for_code_test_only: true
      mock_file_pattern: "*_MOCK_*"
      real_loader_missing_data_behavior: raise_clear_error
      mock_excluded_from_claims: true

  graph_integration:
    new_node_types: [tumor_serine_program, nk_topology_state]
    new_edge_types: [metabolic_crosstalk, sm_topology_axis]
    rules:
      - "metabolic_crosstalk edges require cell-type-resolved endpoints"
      - "crosstalk edge sign is calibrated on the positive-control cohort, not assumed"
      - "no edge derived from external-validation labels"

  validation:
    positive_control:
      purpose: "recover the published serine->SM->topology->cytotoxicity axis where it was proven"
      cohort: TCGA-LIHC
      scrna_dataset: SEARCH_REQUIRED
      prereg_hypotheses:
        - "H1 tumor_serine_capacity ⟂ nk_sm_balance (direction calibrated, reported)"
        - "H2 nk_sm_balance (+) nk_protrusion_machinery"
        - "H3 nk_protrusion_machinery (+) cytotoxicity anchors"
        - "H4 nk_topology_permissive (−) HAVCR2 / dysfunction"
        - "H5 intratumoral NK < peritumoral/peripheral NK in sm_balance & protrusion machinery (scRNA)"
      recovery_definition: "H2-H5 pass in pre-registered direction in liver"
    extension:
      purpose: "test the same axis in a new, unclaimed cancer = the novel result"
      cohort_group: gastric_cancer
    gold_standard_genes: [SGMS1, SMPD1, SMPD3, PHGDH, PSAT1, HAVCR2, ADAM10, ADAM17, TIGIT, MICA, MICB]

  therapeutic_hook:
    intervention: "restore NK sphingomyelin (inhibit SM catabolism: ASM/SMPD1, NSMASE1-3/SMPD2-4)"
    combination: "sphingomyelinase inhibition + Tim3 (HAVCR2) checkpoint blockade"
    patient_stratification_readout: "in-silico SM-restoration benefit ranking (Phase 14R.8)"
    validation_assays:
      - "NK-tumor co-culture cytotoxicity assay"
      - "SEM / super-resolution membrane-protrusion imaging"
      - "single-immunocyte mass spectrometry (membrane SM)"
      - "lytic immune-synapse formation assay"
      - "sphingomyelinase-inhibitor rescue +/- Tim3 blockade"

  provenance:
    created_by: ""
    created_date: "2026-07-06"
    calibration_status: PENDING
    change_log:
      - "0.1.0 initial card from Nat Immunol 2023 + Clin Transl Med 2023 framing"
