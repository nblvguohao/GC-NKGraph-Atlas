# ==============================================================================
# adenosine_a2ar_nk_suppression.yaml
#
# Second mechanism card — demonstrates the card format's reusability by encoding
# a published mechanism distinct from the serine–SM–topology axis.
#
# Target mechanism: adenosine-A2AR mediated NK cell suppression in the tumor
# microenvironment. Extracellular adenosine accumulates in hypoxic tumors, binds
# A2A receptor (ADORA2A) on NK cells, elevates intracellular cAMP, and suppresses
# NK cytotoxicity, IFN-γ production, and proliferation.
#
# Reference: Young A, et al. A2AR adenosine signaling suppresses natural killer
# cell maturation in the tumor microenvironment. Cancer Res 2018;78:1003–16.
# And: Chambers AM, et al. Adenosinergic signaling in natural killer cells.
# Cell Mol Immunol 2024;21:1–12.
# ==============================================================================
mechanism_card:
  id: adenosine_a2ar_nk_suppression
  version: 0.1.0
  status: DRAFT
  one_line: >
    Tumor-derived adenosine signals through the A2A receptor (ADORA2A) on NK cells,
    elevating intracellular cAMP and suppressing cytotoxicity, IFN-γ production,
    proliferation, and maturation — a metabolic-immune checkpoint distinct from the
    serine–SM axis.

  origin:
    paper_title: "A2AR adenosine signaling suppresses natural killer cell maturation in the tumor microenvironment"
    authors: "Young A, Ngiow SF, Gao Y, Patch AM, Barkauskas DS, Messaoudene M, Lin G, Coudert JD, et al."
    journal: "Cancer Research"
    year: 2018
    doi: "10.1158/0008-5472.CAN-17-2198"
    pmid: "29180476"
    lab: "Smyth MJ / Ngiow SF, QIMR Berghofer / University of Pennsylvania"
    notes: >
      Additional mechanistic detail from Chambers AM et al., Cell Mol Immunol 2024
      (DOI 10.1038/s41423-024-01196-4). The adenosine axis is a well-established
      metabolic immune checkpoint in T cells (A2AR blockade + anti-PD-1); its role
      in NK cells is less clinically explored. The mechanism is biochemically
      distinct from serine–SM (cAMP/PKA signaling vs lipid metabolism), providing
      a clean test of the card format's generality.

  biology:
    phenotype: "Suppressed NK cytotoxicity, reduced IFN-γ, impaired NK maturation (CD27+CD11b− → CD27−CD11b+)"
    cell_type_affected: "intratumoral NK cells"
    tissue_context: "multiple solid tumors (melanoma, breast, lung); hypoxia-driven"
    mechanistic_chain:
      - step: 1
        actor_cell_type: tumor
        molecular_event: "hypoxia → ATP release → extracellular ATP catabolism by CD39 (ENTPD1) → AMP"
      - step: 2
        actor_cell_type: tumor
        molecular_event: "AMP → adenosine by CD73 (NT5E) on tumor/stroma cells"
      - step: 3
        actor_cell_type: nk
        molecular_event: "adenosine binds A2AR (ADORA2A) on NK cells → Gs protein → adenylyl cyclase → cAMP↑"
      - step: 4
        actor_cell_type: nk
        molecular_event: "cAMP → PKA activation → CREB phosphorylation → suppression of cytotoxicity genes (GZMB, PRF1, IFNG)"
      - step: 5
        actor_cell_type: nk
        molecular_event: "reduced NK killing capacity; impaired maturation; PKA-dependent inhibition of LFA-1/ICAM-1 conjugate formation"

  # ---- The COMPUTABLE layer: what transcriptomes CAN measure ----
  transcriptional_proxy:
    status: ACTIVE
    claim_boundary: >
      Outputs describe a transcriptional program ASSOCIATED-WITH adenosine-mediated
      NK suppression. Never claim direct measurement of adenosine concentration,
      cAMP levels, or PKA activity from transcriptome.
    modules:
      - name: tumor_adenosine_production
        role: tumor_side
        cell_type_attribution: malignant
        genes: [NT5E, ENTPD1, ADA, ADK, SLC29A1, SLC29A2, SLC28A1, SLC28A2, SLC28A3]
        expected_direction: higher_is_more_adenosine_production
      - name: tumor_hypoxia_signature
        role: tumor_side
        cell_type_attribution: malignant
        genes: [HIF1A, EPAS1, ARNT, VEGFA, LDHA, PDK1, SLC2A1, CA9, BNIP3, ENO1]
        expected_direction: higher_is_more_hypoxic
      - name: nk_a2ar_signaling
        role: immune_side
        cell_type_attribution: nk
        genes: [ADORA2A, ADORA2B, ADORA1, ADORA3, GNAS, GNAI1, GNAI2]
        expected_direction: higher_is_more_suppressed
      - name: nk_camp_pka_effectors
        role: immune_side
        cell_type_attribution: nk
        genes: [PRKACA, PRKACB, PRKAR1A, PRKAR2A, CREB1, CREBBP, EP300, NFKB1, RELA]
        expected_direction: context_dependent
      - name: nk_cytotoxicity_outcome
        role: outcome_anchor
        cell_type_attribution: nk
        genes: [NKG7, GNLY, GZMB, PRF1, IFNG, TNF, FASLG, LAMP1]
        expected_direction: axis_negative_correlate   # adenosine suppresses these
      - name: nk_maturation_markers
        role: immune_side
        cell_type_attribution: nk
        genes: [CD27, CD11B, KLRC1, KLRK1, NCR1, FCGR3A, KIT]
        expected_direction: lower_is_less_mature   # suppressed by adenosine
      - name: therapeutic_hook_a2ar
        role: therapeutic_hook
        cell_type_attribution: nk
        genes: [ADORA2A, ADORA2B, ENTPD1, NT5E]
        expected_direction: higher_is_immunosuppressive
    derived_scores:
      tumor_adenosine_score: "mean_zscore(tumor_adenosine_production | malignant)"
      tumor_hypoxia_score: "mean_zscore(tumor_hypoxia_signature | malignant)"
      nk_a2ar_signaling_score: "mean_zscore(nk_a2ar_signaling | nk)"
      nk_camp_activation_score: "mean_zscore(nk_camp_pka_effectors | nk)"
      nk_cytotoxicity_adenosine_score: "mean_zscore(nk_cytotoxicity_outcome | nk)"
      adenosine_axis_score: >
        integrated(tumor_adenosine_score + tumor_hypoxia_score,
                   nk_a2ar_signaling_score, nk_cytotoxicity_adenosine_score [negative])
    attribution:
      require_celltype_resolution_before_claim: true
      method: scrna_anchored
      unresolved_flag: MIXED_UNRESOLVED
    caveats:
      - "Transcriptional proxy != adenosine concentration != cAMP level != PKA activity."
      - "Adenosine is a metabolite; its concentration depends on CD39/CD73 enzyme activity, which is not fully captured by transcription."
      - "A2AR signaling involves GPCR cascades where post-translational regulation dominates."
      - "CD39/CD73 are also expressed on Tregs, MDSCs, and stromal cells — attribution to malignant cells requires scRNA resolution."
      - "A2AR antagonists (caffeine, istradefylline, CPI-444) are clinically available; transcriptional prediction of response is not validated."

  physical_ground_truth:
    status: GATED
    data_modality: ["tumor interstitial fluid adenosine concentration (microdialysis)", "NK intracellular cAMP (ELISA/FRET)", "PKA activity assay", "phospho-CREB (flow cytometry)"]
    targets: [adenosine_concentration_µM, nk_cAMP_fmol_per_1e6_cells, pCREB_MFI, pPKA_substrate_MFI]
    availability: UNAVAILABLE
    mock_policy:
      allow_mock_for_code_test_only: true
      mock_file_pattern: "*_MOCK_*"
      real_loader_missing_data_behavior: raise_clear_error
      mock_excluded_from_claims: true

  graph_integration:
    new_node_types: [tumor_adenosine_program, nk_a2ar_state]
    new_edge_types: [adenosine_crosstalk, hypoxia_adenosine_axis]
    rules:
      - "adenosine_crosstalk edges require cell-type-resolved endpoints (tumor vs NK)"
      - "adenosine_crosstalk edge sign is calibrated on a positive-control cohort where adenosine is known to be elevated (e.g., hypoxic melanoma or renal cell carcinoma)"
      - "no edge derived from external-validation labels"
      - "hypoxia_adenosine_axis edges connect HIF1A targets to CD39/CD73 expression"

  validation:
    positive_control:
      purpose: "recover the adenosine→A2AR→cAMP→NK suppression axis in a system where it is established"
      cohort: TCGA-SKCM   # melanoma: well-characterized adenosine axis, anti-PD-1 context
      scrna_dataset: SEARCH_REQUIRED
      prereg_hypotheses:
        - "H1 tumor_adenosine_score (+) nk_a2ar_signaling_score (adenosine-A2AR coupling)"
        - "H2 nk_a2ar_signaling_score (−) nk_cytotoxicity_adenosine_score (A2AR suppresses killing)"
        - "H3 tumor_hypoxia_score (+) tumor_adenosine_score (hypoxia drives adenosine)"
        - "H4 nk_camp_activation_score (−) nk_cytotoxicity_adenosine_score (cAMP-PKA suppresses killing)"
        - "H5 intratumoral NK show higher a2ar_signaling_score than peritumoral NK"
      recovery_definition: "H1–H5 pass in pre-registered direction in melanoma"
    extension:
      purpose: "test the adenosine axis in gastric cancer (parallel to the serine–SM axis Arm B)"
      cohort_group: gastric_cancer
    gold_standard_genes: [ADORA2A, NT5E, ENTPD1, GZMB, PRF1, IFNG, HIF1A, ADORA2B, CD27, FCGR3A]

  therapeutic_hook:
    intervention: "A2AR antagonist (istradefylline, CPI-444, or caffeine) or anti-CD73 (oleclumab)"
    combination: "A2AR blockade + anti-PD-1 (nivolumab/pembrolizumab) ± Tim3 blockade"
    patient_stratification_readout: "in-silico adenosine-axis score ranking samples by predicted A2AR-blockade benefit"
    validation_assays:
      - "NK-tumor co-culture + adenosine / NECA + A2AR antagonist"
      - "intracellular cAMP ELISA (NK cells post co-culture)"
      - "phospho-CREB flow cytometry (NK cells)"
      - "CD107a degranulation assay ± A2AR blockade"
      - "NK maturation panel (CD27/CD11b/KLRK1) ± adenosine"

  provenance:
    created_by: ""            # fill in
    created_date: "2026-07-09"
    calibration_status: PENDING
    change_log:
      - "0.1.0 initial card from Young et al. Cancer Res 2018 + Chambers et al. 2024"
