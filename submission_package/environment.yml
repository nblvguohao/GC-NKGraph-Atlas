name: gc-nkgraph
channels:
  - conda-forge
  - pytorch
  - bioconda
  - defaults
dependencies:
  # Core scientific computing
  - python=3.10
  - pip
  - numpy<2
  - pandas>=2.0
  - scipy
  - scikit-learn
  - pyarrow

  # Config / I/O
  - pyyaml
  - networkx

  # Single-cell analysis
  - scanpy>=1.10
  - anndata>=0.10
  - leidenalg
  - python-igraph

  # Single-cell integration
  - scvi-tools>=1.2
  - harmonypy

  # Spatial
  - squidpy

  # Visualization
  - matplotlib>=3.7
  - seaborn>=0.13

  # ML baselines
  - xgboost>=2.0
  - lightgbm>=4.5

  # Deep learning
  - pytorch>=2.0
  - pytorch-cuda=12.1

  # Model interpretation
  - shap

  # Trajectory
  - pybind11  # required by cellrank

  # Testing
  - pytest>=7.0
  - pytest-cov

  - pip:
    # GEO probe->gene mapping (external-cohort validation, Arm B)
    - GEOparse>=2.0

    # Doublet detection
    - scrublet

    # Cell type annotation
    - celltypist>=1.6

    # Reference mapping
    - scarches

    # Trajectory analysis
    - cellrank

    # Graph deep learning
    - torch_geometric
    - torch_scatter
    - torch_sparse
    - torch_cluster
